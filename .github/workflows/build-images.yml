      #     -X DELETE \
      #     -H "Accept: application/vnd.github+json" \
      #     -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
      #     -H "X-GitHub-Api-Version: 2022-11-28" \
      #     https://api.github.com/users/${REPOOWNER}/packages/container/${SHORTREPONAME}%2F${DEBIANNAME}
