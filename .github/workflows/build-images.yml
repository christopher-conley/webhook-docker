name: Build webhook images
run-name: build-webhook-images
on:
  push:
    branches:
      - "main"
jobs:
  build-test-images:
    name: Build test images
    runs-on: ubuntu-latest

    steps:
      - id: checkout_repo
        name: Checkout repo
        uses: actions/checkout@v3

      - id: set_build_image_tags
        name: Set build image tags
        run: |
          echo "REGISTRYPATH=$(echo "ghcr.io/${{ github.repository }}")" >> $GITHUB_OUTPUT
          echo "DEBIANNAME=$(echo webhook-debian)" >> $GITHUB_OUTPUT
          echo "DINDNAME=$(echo webhook-dind)" >> $GITHUB_OUTPUT
          echo "PACKAGEVERSION=$(cat ${{ github.workspace }}/VERSION)" >> $GITHUB_OUTPUT
          echo "TAG=$(echo "test")" >> $GITHUB_OUTPUT

      - id: set_full_image_names
        name: Set full image names
        run: |
          echo "DEBIANIMAGE=$(echo "${{steps.set_build_image_tags.outputs.REGISTRYPATH}}/${{steps.set_build_image_tags.outputs.DEBIANNAME}}")" >> $GITHUB_OUTPUT
          echo "DEBIANSHORTIMAGE=$(echo "${{steps.set_build_image_tags.outputs.DEBIANNAME}}")" >> $GITHUB_OUTPUT
          echo "DINDIMAGE=$(echo "${{steps.set_build_image_tags.outputs.REGISTRYPATH}}/${{steps.set_build_image_tags.outputs.DINDNAME}}")" >> $GITHUB_OUTPUT
          echo "DINDSHORTIMAGE=$(echo "${{steps.set_build_image_tags.outputs.DINDNAME}}")" >> $GITHUB_OUTPUT

      - id: ghcr_login
        name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Disabling due to:
      # https://github.com/docker/setup-buildx-action/issues/113
      # - id: setup_buildx
      #   name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v2

      - id: build_test_image_debian
        name: Build Debian test image
        uses: docker/build-push-action@v4.1.1
        with:
          context: ${{ github.workspace }}/Dockerfiles
          push: true
          file: Dockerfiles/Dockerfile.debian
          tags: ${{ steps.set_full_image_names.outputs.DEBIANIMAGE }}:${{ steps.set_build_image_tags.outputs.TAG }}

      - id: build_test_image_dind
        name: Build Docker-in-Docker test image
        uses: docker/build-push-action@v4.1.1
        with:
          context: ${{ github.workspace }}/Dockerfiles
          push: true
          file: Dockerfiles/Dockerfile.dind
          tags: ${{ steps.set_full_image_names.outputs.DINDIMAGE }}:${{ steps.set_build_image_tags.outputs.TAG }}

    outputs:
      DEBIANIMAGE: ${{ steps.set_full_image_names.outputs.DEBIANIMAGE }}
      DEBIANSHORTIMAGE: ${{ steps.set_full_image_names.outputs.DEBIANSHORTIMAGE }}
      DEBIANNAME: ${{ steps.set_build_image_tags.outputs.DEBIANNAME }}
      DINDIMAGE: ${{ steps.set_full_image_names.outputs.DINDIMAGE }}
      DINDSHORTIMAGE: ${{ steps.set_full_image_names.outputs.DINDSHORTIMAGE }}
      DINDNAME: ${{ steps.set_build_image_tags.outputs.DINDNAME }}
      PUSHSUCCESS: ${{ steps.build_test_image_debian.outcome }}
      REPOOWNER: ${{ github.repository_owner }}
      FULLREPONAME: ${{ github.repository }}
      SHORTREPONAME: ${{ github.event.repository.name }}
      PACKAGENAME: "${{ github.event.repository.name}}/${{ steps.set_build_image_tags.outputs.DEBIANNAME }}"
      DINDPACKAGENAME: "${{ github.event.repository.name}}/${{ steps.set_build_image_tags.outputs.DINDNAME }}"
      PACKAGEVERSION: ${{ steps.set_build_image_tags.outputs.PACKAGEVERSION }}
      TAG: ${{ steps.set_build_image_tags.outputs.TAG }}

  run-test-images:
    name: Run test images
    runs-on: ubuntu-latest
    needs: build-test-images
    env:
      DEBIANIMAGE: ${{ needs.build-test-images.outputs.DEBIANIMAGE }}
      DEBIANSHORTIMAGE: ${{ needs.build-test-images.outputs.DEBIANSHORTIMAGE }}
      DEBIANNAME: ${{ needs.build-test-images.outputs.DEBIANNAME }}
      DINDIMAGE: ${{ needs.build-test-images.outputs.DINDIMAGE }}
      DINDSHORTIMAGE: ${{ needs.build-test-images.outputs.DINDSHORTIMAGE }}
      DINDNAME: ${{ needs.build-test-images.outputs.DINDNAME }}
      REPOOWNER: ${{ needs.build-test-images.outputs.REPOOWNER }}
      SHORTREPONAME: ${{ needs.build-test-images.outputs.SHORTREPONAME }}

    services:
      debian_test_image:
        image: "${{ needs.build-test-images.outputs.DEBIANIMAGE }}:${{ needs.build-test-images.outputs.TAG }}"
        ports:
          - 5572:9000
        options: --name ${{ needs.build-test-images.outputs.DEBIANNAME }}-temp

      dind_test_image:
        image: "${{ needs.build-test-images.outputs.DINDIMAGE }}:${{ needs.build-test-images.outputs.TAG }}"
        ports:
          - 5573:9001
        options: --name ${{ needs.build-test-images.outputs.DINDNAME }}-temp

    steps:

      - id: check_if_listening
        name: Check if the container is listening
        run: |
          # Make sure the containers have had enough time to wake up and have coffee
          sleep 5
          CODE=$(curl -L -s -o /dev/null -w "%{http_code}" "http://localhost:5572/hooks/webhook")
          CODE2=$(curl -L -s -o /dev/null -w "%{http_code}" "http://localhost:5573/hooks/webhook")
          if [ $CODE -ne 200 ] || [ $CODE2 -ne 200 ] ; then
            echo "TESTRESULT=$(echo "failed")" >> $GITHUB_OUTPUT
          else
            echo "TESTRESULT=$(echo "listening")" >> $GITHUB_OUTPUT
          fi
    outputs:
      TESTRESULT: ${{ steps.check_if_listening.outputs.TESTRESULT }}

  tag-prod-images:
    name: Tag prod images
    runs-on: ubuntu-latest
    needs: [run-test-images, build-test-images]
    if: ${{ needs.run-test-images.outputs.TESTRESULT == 'listening' }}

    steps:
      - id: ghcr_login
        name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: tag_prod_image_debian
        name: Tag Debian test image with version and latest
        run: |
          docker pull "${{ needs.build-test-images.outputs.DEBIANIMAGE }}:${{ needs.build-test-images.outputs.TAG }}"
          docker tag "${{ needs.build-test-images.outputs.DEBIANIMAGE }}:${{ needs.build-test-images.outputs.TAG }}" "${{ needs.build-test-images.outputs.DEBIANIMAGE }}:latest"
          docker tag "${{ needs.build-test-images.outputs.DEBIANIMAGE }}:latest" "${{ needs.build-test-images.outputs.DEBIANIMAGE }}:${{ needs.build-test-images.outputs.PACKAGEVERSION }}"
          docker pull "${{ needs.build-test-images.outputs.DINDIMAGE }}:${{ needs.build-test-images.outputs.TAG }}"
          docker tag "${{ needs.build-test-images.outputs.DINDIMAGE }}:${{ needs.build-test-images.outputs.TAG }}" "${{ needs.build-test-images.outputs.DINDIMAGE }}:latest"
          docker tag "${{ needs.build-test-images.outputs.DINDIMAGE }}:latest" "${{ needs.build-test-images.outputs.DINDIMAGE }}:${{ needs.build-test-images.outputs.PACKAGEVERSION }}"
      - id: push_prod_image_debian
        name: Push prod image to GHCR
        run: |
          docker push "${{ needs.build-test-images.outputs.DEBIANIMAGE }}:latest"
          docker push "${{ needs.build-test-images.outputs.DEBIANIMAGE }}:${{ needs.build-test-images.outputs.PACKAGEVERSION }}"
          docker push "${{ needs.build-test-images.outputs.DINDIMAGE }}:latest"
          docker push "${{ needs.build-test-images.outputs.DINDIMAGE }}:${{ needs.build-test-images.outputs.PACKAGEVERSION }}"  
  cleanup:
    if: ${{ !cancelled() }}
    name: Delete artifacts
    runs-on: ubuntu-latest
    needs: [build-test-images, tag-prod-images]
    env:
      DEBIANNAME: ${{ needs.build-test-images.outputs.DEBIANNAME }}
      DINDNAME: ${{ needs.build-test-images.outputs.DINDNAME }}
      REPOOWNER: ${{ needs.build-test-images.outputs.REPOOWNER }}
      SHORTREPONAME: ${{ needs.build-test-images.outputs.SHORTREPONAME }}

    steps:
      - name: Debug
        run: |
          echo "Package name is: ${{ needs.build-test-images.outputs.PACKAGENAME }}"
          echo "DIND package name is: ${{ needs.build-test-images.outputs.DINDPACKAGENAME }}"

      - id: cleanup_debian_artifacts
        if: ${{ needs.build-test-images.outputs.PUSHSUCCESS == 'success' }}
        name: Delete Debian test image
        uses: actions/delete-package-versions@v4
        with:
          package-type: container
          package-name: ${{ needs.build-test-images.outputs.PACKAGENAME }}
          min-versions-to-keep: 1
          delete-only-untagged-versions: false

      - id: cleanup_dind_artifacts
        if: ${{ needs.build-test-images.outputs.PUSHSUCCESS == 'success' }}
        name: Delete DIND test image
        uses: actions/delete-package-versions@v4
        with:
          package-type: container
          package-name: ${{ needs.build-test-images.outputs.DINDPACKAGENAME }}
          min-versions-to-keep: 1
          delete-only-untagged-versions: false

      # - id: cleanup_artifacts
      #   if: ${{ needs.build-test-images.outputs.PUSHSUCCESS == 'success' }}
